<!doctype html>
<html lang="en" layout:decorate="~{layout/layout.html}">
  <head>

    <title>Admin</title>
 
  </head>
  <body>
    <!-- Header -->

    <style>
      @media screen and (min-width: 768px) {
        .main-menu {
          width: 280px;
        }
      }
    </style>

    <!-- Menu -->


      <!-- Main -->
      <main layout:fragment="content">
        <div class="d-flex justify-content-between">
          <h2>Eventos</h2>
          <button
            class="btn btn-success"
            data-bs-toggle="modal"
            data-bs-target="#modal_eventos"
          >
            Novo Evento
          </button>
        </div>

        <table class="table">
          <thead>
            <tr>
              <th>Data</th>
              <th>Local</th>
              <th>Horário</th>
              <th>Opções</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        
        <!-- Modal -->
        <div class="modal" tabindex="-1" id="modal_eventos">
          <div class="modal-dialog">
            <div class="modal-content">
            <form action="#">
              <div class="modal-header">
                <h5 class="modal-title">Novo Evento</h5>
                <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="Close"
                ></button>
              </div>
              <div class="modal-body">
                <div class="mb-3">
                  <label for="data" class="form-label">Data</label>
                  <input
                  type="text"
                  name="data"
                  id="data"
                  class="form-control"
                  />
                </div>
                <div class="mb-3">
                  <label for="local" class="form-label">Local</label>
                  <input
                  type="text"
                  name="local"
                    id="local"
                    class="form-control"
                    />
                </div>
                <div class="mb-3">
                  <label for="horario" class="form-label">Horário</label>
                  <input
                  type="text"
                  name="horario"
                  id="horario"
                  class="form-control"
                  />
                </div>
              </div>
              <div class="modal-footer">
                <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
                >
                Close
              </button>
              <button type="button" class="btn btn-success">
                Save changes
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
  
  
</body>
</html>
